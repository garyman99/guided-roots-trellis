<!doctype html>
<!-- Riverside Community Pickup — the tiny app under test in this lab.
     Self-contained on purpose: the tests open it straight from disk (file://),
     so there is no server to start and nothing to install.
     DO NOT edit this file: this lab is about RUNNING one existing test, not
     changing anything. The three facts below are the ground truth the three
     prepared tests check against. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Riverside Community Pickup</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; padding: 0 1rem; color: #1b2b1b; }
    h1 { margin-bottom: 0.25rem; }
    .card { margin-top: 1.25rem; padding: 1rem 1.25rem; border: 1px solid #cbd5c0; border-radius: 0.5rem; }
    .card h2 { margin: 0 0 0.5rem; font-size: 1rem; color: #33691e; }
    .card p { margin: 0.15rem 0; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Riverside Community Pickup</h1>
  <p>Weekly produce pickup for the neighborhood.</p>

  <section class="card">
    <h2>When &amp; where</h2>
    <!-- Each line is a plain fact one prepared test looks at. -->
    <p data-testid="weekday-hours">Weekday pickup: Tuesday to Friday, 4 to 7 PM</p>
    <p data-testid="dropoff-location">Drop-off point: 220 River Road, north lot</p>
    <p data-testid="contact-email">Questions? Email pickup@riverside.example</p>
  </section>
</body>
</html>
