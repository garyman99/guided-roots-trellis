<!doctype html>
<!-- Community Garden status board — the tiny app under test in this lab.
     Self-contained on purpose: the test opens it straight from disk (file://),
     so there is no server to start and nothing to install.
     DO NOT edit this file: the exercise is to READ a failing test, not to make
     it pass. The status below is the ground truth the test is checked against. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Community Garden — Status</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 30rem; margin: 3rem auto; padding: 0 1rem; }
    h1 { margin-bottom: 0.25rem; }
    .board { margin-top: 1.5rem; padding: 1rem 1.25rem; border: 1px solid #cbd5c0; border-radius: 0.5rem; }
    .board h2 { margin: 0 0 0.5rem; font-size: 1rem; color: #33691e; }
    #plot-status { font-weight: 700; font-size: 1.2rem; color: #1b5e20; }
  </style>
</head>
<body>
  <h1>Community Garden</h1>
  <p>Season status board for the neighborhood plots.</p>

  <section class="board">
    <h2>Plot requests</h2>
    <!-- The single fact this lab's test looks at. It currently reads OPEN. -->
    <p id="plot-status" data-testid="plot-status">Plot requests are open</p>
  </section>
</body>
</html>
