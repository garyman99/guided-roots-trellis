# iter-2 findings. Two independent evals: 92 (primary) / 91 (second opinion) — split across
# the 92 threshold; PASS, no critical failures. ACCEPTED. iter-1's fixable product defects are
# confirmed fixed below; residual items are low/deferred and non-blocking.

- finding_id: "tests-not-run-intervention-misfires-after-completion"
  severity: "medium"
  category: "evaluation"
  status: "FIXED (iter-2)"
  fix: "packages/session-events/src/interventions.ts — tests_not_run AND diff_not_viewed now guard on completedCheckpoints.length === 0, so neither fires once the checkpoint is complete. Covered by a new test in packages/session-events/test/interventions.test.ts."
  acceptance_evidence_met: "iter-2 export.json contains ZERO intervention.proposed events (vs iter-1's two tests_not_run, incl. one post-completion)."

- finding_id: "chat-input-focus-trap-behind-code-studio"
  severity: "high"
  category: "ux"
  status: "MITIGATED (iter-2, instruction) — root behavior partly open"
  fix: "lab.json welcome now maps 'Trellis Guide taskbar button -> bring this chat forward'. Root cause was expected overlapping-window occlusion (a covered window receives no clicks), not a code bug; the cue removed the learner-facing detour."
  acceptance_evidence_met: "iter-2 had zero focus-trap detour (~3 min in iter-1 -> 0); she fronted windows cleanly via the taskbar (BEATs 5, 13)."
  residual: "The taskbar toggle once minimized the Guide instead of fronting it (minor); hardening taskbar-fronting to always bring-forward is a low follow-up."

- finding_id: "location-field-line-number-ambiguity"
  severity: "medium"
  category: "ux"
  status: "MITIGATED (iter-2, instruction) — output fidelity preserved by design"
  fix: "README + EVIDENCE.md header + FAQ now name which line to copy: the code-frame arrow (>) line (the line where the check failed)."
  rationale_not_collapsed: "Real Playwright failures legitimately print two locations — the test declaration (summary header, :21:1) and the throw site (code-frame arrow, :22). Collapsing them (e.g. a single-line test body) would reduce fidelity to real output and risk overfitting to one layout, which the scenario explicitly warns against (transferable-learning). Teaching the learner to read the arrow line is the transferable skill. Kept the real output; taught which line."
  acceptance_evidence_met: "iter-2 learner recorded :22 deliberately per the cue (vs iter-1's guess)."
  residual: "The second evaluator would still prefer collapsing to one number for a clean difficulty-1 novice experience; logged as a defensible alternative a future iteration MAY take. Non-blocking."

- finding_id: "reach-chat-instruction-missing-from-opening"
  severity: "low"
  category: "instruction"
  status: "FIXED (iter-2)"
  fix: "lab.json welcome adds the reach-Sage-via-taskbar cue."
  acceptance_evidence_met: "iter-2 zero clarifying-question delivery friction; she reached Sage/fronted windows without a detour."

- finding_id: "scroll-past-red-caution-not-salient-at-note-open"
  severity: "low"
  category: "instruction"
  status: "FIXED (iter-2)"
  fix: "Caution added to the welcome AND the EVIDENCE.md header (where she decides what to write)."
  acceptance_evidence_met: "iter-2 recovery from the scripted mistake was UNASSISTED (self-corrected from the note header, zero Sage hints); iter-1 required a focused hint."

- finding_id: "scripted-first-mistake-caps-accuracy-dimension"
  severity: "low"
  category: "evaluation"
  status: "WONTFIX (scenario integrity)"
  detail: "failure-evidence-accuracy (35 wt) reserves 'exceptional' for a correct FIRST note; the persona is scripted to err first, so a faithful run caps at ~88 on the heaviest dimension. This is the single structural reason iter-2 sits at 92/91 rather than clearly above. Penalizing required persona fidelity is not a legitimate reason to withhold product acceptance (precedent: improve-delayed-order-reply, accepted 92/91). Do NOT weaken the scenario."

- finding_id: "reflection-widget-untagged-and-no-autoscroll"
  severity: "low"
  category: "ux"
  status: "OPEN (out of this scenario's rubric; harness/polish backlog)"
  observed_behavior: "The end-of-run confidence 1-5 rating renders as clickable text rather than tagged/focusable controls (the simulator had to screenshot to locate it), and the chat does not auto-scroll to the newest message, so reaching the reflection required hunting."
  expected_behavior: "The 1-5 confidence control is a tagged, focusable set of buttons; the chat auto-scrolls to the newest message."
  learner_impact: "Minor friction on the closing reflection step; affects every lab with a reflection, not just this scenario."
  status_note: "Non-blocking; logged for the shared reflection/desktop surface."

- finding_id: "note-revision-history-not-persisted"
  severity: "low"
  category: "evaluation"
  status: "DEFERRED (platform-wide instrumentation)"
  detail: "file.changed carries no content snapshot, so the mistaken intermediate note state is inferred (from timestamps + trace) rather than stored, though the spec's evidence_requirements ask for the note 'and its revision history'. Out of scope for this lab; logged for the harness backlog."
