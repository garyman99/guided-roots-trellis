<svg viewBox="0 0 1020 1746" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Course-generation flow with a gap-reconciliation pause and a rehearsal phase</title>
  <desc>Two proposed changes. (1) A gap-reconciliation pause between designing and authoring: designing runs unconstrained by current capabilities so it deliberately produces gaps, approving the blueprint commissions them, and a no-agent reconcile re-diffs the registry until every commissioned gap is closed. (2) A new REHEARSAL phase after materializing: materializing becomes per-lesson and idempotent, so the operator can send the whole course or a single lesson to be built into playable labs; the target persona then plays each materialized lab in a real browser and the trace is classified into a friction verdict. A lesson whose rehearsal fails is sent back to authoring lesson-scoped — only that lesson re-authors, re-materializes and re-rehearses, under a bounce cap. Once no lesson is bounced, one course-wide cohesion sweep runs before the publish gate can be approved; its blockers bounce lessons the same way. The learner simulation therefore leaves the authoring loop, which keeps only the deterministic auto-solve prove gate.</desc>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#e6e8eb"/></marker>
    <symbol id="doc" viewBox="0 0 100 64" preserveAspectRatio="none"><path d="M1 1 H99 V52 C66 66 33 42 1 52 Z" fill="none" stroke="#e6e8eb" stroke-width="1.3" vector-effect="non-scaling-stroke"/></symbol>
  </defs>
  <style>
    .b{fill:none;stroke:#e6e8eb;stroke-width:1.4}
    .panel{fill:none;stroke:#e6e8eb;stroke-width:1;opacity:.32}
    .grp{fill:none;stroke:#e6e8eb;stroke-width:1;opacity:.55}
    .gate{fill:none;stroke:#e6e8eb;stroke-width:1;stroke-dasharray:4 3;opacity:.8}
    .human{fill:none;stroke:#e6e8eb;stroke-width:1.5;stroke-dasharray:5 3}
    .ln{fill:none;stroke:#e6e8eb;stroke-width:1.4}
    .newband{fill:#e6e8eb;opacity:.05}
    text{fill:#e6e8eb;font-size:12.5px}
    .lbl{font-size:11px;letter-spacing:.05em;opacity:.65}
    .sm{font-size:10.5px;opacity:.75}
    .ttl{font-size:11px;opacity:.85}
    .new{font-size:10px;letter-spacing:.08em;opacity:.9}
  </style>

