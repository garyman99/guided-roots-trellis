  <text x="34" y="1078" class="lbl">MATERIALIZING &#183; NO AGENTS &#183; PER-LESSON SCOPE &#183; IDEMPOTENT</text>
  <rect class="gate" x="790" y="1064" width="196" height="26" rx="3"/><text x="888" y="1081" text-anchor="middle" class="ttl">G4 &#183; Rehearse?</text>
  <g text-anchor="middle">
    <rect class="b" x="46" y="1100" width="170" height="56" rx="2"/><text x="131" y="1122" class="sm">materialize scope</text><text x="131" y="1140" class="sm">all lessons | one lesson</text>
