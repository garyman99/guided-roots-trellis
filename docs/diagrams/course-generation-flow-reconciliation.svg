    <path class="ln" d="M922 608 V688 H510 V712" marker-end="url(#a)"/>
    <text x="712" y="682" class="sm">all commissioned gaps closed &#8594; author</text>
    <text x="115" y="640" class="sm">at the gate the operator may instead:</text>
    <text x="115" y="656" class="sm">&#183; defer &#8212; drop this gap's lessons</text>
    <text x="115" y="672" class="sm">&#183; redesign &#8212; free-text prompt reopens designing</text>
  </g>
  <path class="ln" d="M893 510 V486" marker-end="url(#a)"/>
  <text x="780" y="500" class="sm">redesign &#8594; reopen designing (human prompt)</text>

