<svg viewBox="0 0 1020 1410" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Course-generation flow with a gap-reconciliation pause</title>
  <desc>Proposed change: designing runs longer and unconstrained by current capabilities, so it deliberately produces capability gaps. A new gap-reconciliation pause sits between designing and authoring: the operator builds the missing capabilities, the registry reloads, and a no-agent reconcile re-diffs the gaps in a loop until all commissioned gaps are closed before authoring begins.</desc>
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0 0 L7 3 L0 6 Z" fill="#e6e8eb"/></marker>
    <symbol id="doc" viewBox="0 0 100 64" preserveAspectRatio="none"><path d="M1 1 H99 V52 C66 66 33 42 1 52 Z" fill="none" stroke="#e6e8eb" stroke-width="1.3" vector-effect="non-scaling-stroke"/></symbol>
  </defs>
  <style>
    .b{fill:none;stroke:#e6e8eb;stroke-width:1.4}
    .panel{fill:none;stroke:#e6e8eb;stroke-width:1;opacity:.32}
    .grp{fill:none;stroke:#e6e8eb;stroke-width:1;opacity:.55}
    .gate{fill:none;stroke:#e6e8eb;stroke-width:1;stroke-dasharray:4 3;opacity:.8}
    .human{fill:none;stroke:#e6e8eb;stroke-width:1.5;stroke-dasharray:5 3}
    .ln{fill:none;stroke:#e6e8eb;stroke-width:1.4}
    .newband{fill:#e6e8eb;opacity:.05}
    text{fill:#e6e8eb;font-size:12.5px}
    .lbl{font-size:11px;letter-spacing:.05em;opacity:.65}
    .sm{font-size:10.5px;opacity:.75}
    .ttl{font-size:11px;opacity:.85}
    .new{font-size:10px;letter-spacing:.08em;opacity:.9}
  </style>

  <rect x="0" y="0" width="1020" height="1410" fill="#0d1017"/>

  <g text-anchor="middle">
    <rect class="b" x="20" y="20" width="150" height="52" rx="2"/><text x="95" y="50">Operator</text>
    <rect class="b" x="210" y="20" width="200" height="52" rx="2"/><text x="310" y="50">Course Studio UI</text>
    <rect class="b" x="450" y="20" width="320" height="52" rx="2"/><text x="610" y="46">CourseRunScheduler</text><text x="610" y="62" class="sm">&#8594; PhaseExecutor &#183; gates &#183; resume</text>
    <path class="ln" d="M170 46 H206" marker-end="url(#a)"/>
    <path class="ln" d="M410 46 H446" marker-end="url(#a)"/>
    <path class="ln" d="M610 72 V104" marker-end="url(#a)"/>
  </g>

  <rect class="panel" x="20" y="110" width="980" height="150" rx="4"/>
  <text x="34" y="130" class="lbl">FRAMING</text>
  <rect class="gate" x="858" y="116" width="128" height="26" rx="3"/><text x="922" y="133" text-anchor="middle" class="ttl">G1 &#183; Frame</text>
  <g text-anchor="middle">
    <rect class="b" x="60" y="152" width="140" height="60" rx="2"/><text x="130" y="187">architect</text>
    <use href="#doc" x="262" y="152" width="160" height="60"/><text x="342" y="184">course-request.md</text>
    <rect class="b" x="480" y="152" width="160" height="60" rx="2"/><text x="560" y="187">learner advocate</text>
    <path class="ln" d="M200 182 H258" marker-end="url(#a)"/>
    <path class="ln" d="M422 182 H476" marker-end="url(#a)"/>
    <path class="ln" d="M560 212 V236 H130 V216" marker-end="url(#a)"/>
    <text x="330" y="252" class="sm">critique loop &#8212; persona-fit / goal-fit</text>
  </g>
  <path class="ln" d="M510 260 V282" marker-end="url(#a)"/>

  <rect class="panel" x="20" y="288" width="980" height="188" rx="4"/>
  <text x="34" y="308" class="lbl">DESIGNING &#183; EXTENDED ITERATION &#183; CAPABILITY-UNCONSTRAINED</text>
  <rect class="gate" x="826" y="294" width="160" height="26" rx="3"/><text x="906" y="311" text-anchor="middle" class="ttl">G2 &#183; Blueprint</text>
  <g text-anchor="middle">
    <rect class="b" x="60" y="330" width="140" height="58" rx="2"/><text x="130" y="364">architect</text>
    <use href="#doc" x="260" y="330" width="150" height="58"/><text x="335" y="361">blueprint</text>
    <rect class="b" x="452" y="322" width="230" height="74" rx="2"/><text x="567" y="352">review panel</text><text x="567" y="372" class="sm">technical &#183; pedagogy</text><text x="567" y="386" class="sm">cohesion &#183; advocate</text>
    <use href="#doc" x="726" y="330" width="150" height="58"/><text x="801" y="361">capability-gaps</text>
    <path class="ln" d="M200 359 H256" marker-end="url(#a)"/>
    <path class="ln" d="M410 359 H448" marker-end="url(#a)"/>
    <path class="ln" d="M682 359 H722" marker-end="url(#a)"/>
    <path class="ln" d="M567 396 V440 H130 V390" marker-end="url(#a)"/>
    <text x="345" y="432" class="sm">design the ideal course &#183; declare any capability &#8212; gaps EXPECTED</text>
  </g>
  <path class="ln" d="M510 476 V498" marker-end="url(#a)"/>

  <rect class="newband" x="20" y="504" width="980" height="200" rx="4"/>
  <rect class="panel" x="20" y="504" width="980" height="200" rx="4"/>
  <text x="34" y="524" class="new">&#9679; NEW &#183; GAP RECONCILIATION &#183; PAUSE &#8212; operator builds the missing capabilities</text>
  <rect class="gate" x="800" y="510" width="186" height="26" rx="3"/><text x="893" y="527" text-anchor="middle" class="ttl">Gate &#183; Gaps closed?</text>
  <g text-anchor="middle">
    <use href="#doc" x="40" y="556" width="150" height="52"/><text x="115" y="586">capability-gaps</text>
    <rect class="b" x="214" y="556" width="150" height="52" rx="2"/><text x="289" y="579" class="sm">capability outbox</text><text x="289" y="595" class="sm">briefs per gap</text>
    <rect class="human" x="388" y="548" width="200" height="68" rx="2"/><text x="488" y="573">operator builds capability</text><text x="488" y="590" class="sm">app &#183; auto-rule &#183; checkpoint</text><text x="488" y="605" class="sm">+ registry entry</text>
    <rect class="b" x="612" y="556" width="150" height="52" rx="2"/><text x="687" y="579" class="sm">capability registry</text><text x="687" y="595" class="sm">reloaded on restart</text>
    <rect class="b" x="786" y="556" width="176" height="52" rx="2"/><text x="874" y="579" class="sm">reconcile &#183; re-diff</text><text x="874" y="595" class="sm">no agents</text>

    <path class="ln" d="M190 582 H210" marker-end="url(#a)"/>
    <path class="ln" d="M364 582 H384" marker-end="url(#a)"/>
    <path class="ln" d="M588 582 H608" marker-end="url(#a)"/>
    <path class="ln" d="M762 582 H782" marker-end="url(#a)"/>

    <path class="ln" d="M830 608 V652 H488 V618" marker-end="url(#a)"/>
    <text x="648" y="646" class="sm">gaps remain &#8212; build &#183; restart &#183; reconcile</text>
    <path class="ln" d="M922 608 V688 H510 V712" marker-end="url(#a)"/>
    <text x="712" y="682" class="sm">all commissioned gaps closed &#8594; author</text>
  </g>

  <rect class="panel" x="20" y="714" width="980" height="316" rx="4"/>
  <text x="34" y="734" class="lbl">AUTHORING &#183; PER LESSON</text>
  <rect class="gate" x="852" y="720" width="134" height="26" rx="3"/><text x="919" y="737" text-anchor="middle" class="ttl">G3 &#183; Package</text>

  <g text-anchor="middle">
    <rect class="b" x="46" y="758" width="128" height="236" rx="2"/><text x="110" y="880">lesson-author</text>
    <use href="#doc" x="230" y="758" width="150" height="58"/><text x="305" y="789">lesson doc</text>

    <rect class="b" x="470" y="756" width="160" height="42" rx="2"/><text x="550" y="781">technical reviewer</text>
    <rect class="b" x="470" y="810" width="160" height="42" rx="2"/><text x="550" y="835">pedagogy reviewer</text>
    <rect class="b" x="470" y="864" width="160" height="42" rx="2"/><text x="550" y="889">cohesion reviewer</text>
    <rect class="b" x="470" y="918" width="160" height="42" rx="2"/><text x="550" y="943">learner advocate</text>

    <rect class="grp" x="672" y="746" width="320" height="230" rx="4"/><text x="832" y="766" class="ttl">revision feedback</text>
    <use href="#doc" x="700" y="776" width="150" height="42"/><text x="775" y="801" class="sm">technical feedback</text>
    <use href="#doc" x="700" y="828" width="150" height="42"/><text x="775" y="853" class="sm">pedagogy feedback</text>
    <use href="#doc" x="700" y="880" width="150" height="42"/><text x="775" y="905" class="sm">cohesion feedback</text>
    <use href="#doc" x="700" y="932" width="150" height="42"/><text x="775" y="957" class="sm">advocate feedback</text>
  </g>

  <path class="ln" d="M174 787 H230" marker-end="url(#a)"/>
  <path class="ln" d="M440 777 H392" marker-end="url(#a)"/>
  <path class="ln" d="M440 777 V939"/>
  <path class="ln" d="M440 777 H468"/><path class="ln" d="M440 831 H468"/><path class="ln" d="M440 885 H468"/><path class="ln" d="M440 939 H468"/>
  <path class="ln" d="M630 777 H698" marker-end="url(#a)"/>
  <path class="ln" d="M630 831 H698" marker-end="url(#a)"/>
  <path class="ln" d="M630 885 H698" marker-end="url(#a)"/>
  <path class="ln" d="M630 939 H698" marker-end="url(#a)"/>
  <path class="ln" d="M832 976 V1004 H110 V996" marker-end="url(#a)"/>
  <text x="430" y="1021" class="sm" text-anchor="middle">re-author with feedback (severity: only blockers loop) &#8212; up to critique-round cap</text>

  <g text-anchor="middle">
    <rect class="b" x="230" y="870" width="150" height="40" rx="2"/><text x="305" y="894" class="sm">auto-solve &#183; prove lab</text>
    <rect class="b" x="230" y="920" width="150" height="40" rx="2"/><text x="305" y="944" class="sm">simulate learner</text>
    <path class="ln" d="M230 890 H176" marker-end="url(#a)"/>
    <path class="ln" d="M230 940 H176" marker-end="url(#a)"/>
  </g>

  <path class="ln" d="M510 1030 V1052" marker-end="url(#a)"/>

  <rect class="panel" x="20" y="1058" width="980" height="120" rx="4"/>
  <text x="34" y="1078" class="lbl">MATERIALIZING &#183; NO AGENTS</text>
  <rect class="gate" x="724" y="1064" width="262" height="26" rx="3"/><text x="855" y="1081" text-anchor="middle" class="ttl">G4 &#183; Publish &#8594; approved &#8594; Go-live</text>
  <g text-anchor="middle">
    <rect class="b" x="60" y="1102" width="170" height="52" rx="2"/><text x="145" y="1133">Materializer</text>
    <use href="#doc" x="300" y="1102" width="150" height="52"/><text x="375" y="1131">playable labs</text>
    <use href="#doc" x="500" y="1102" width="150" height="52"/><text x="575" y="1131">draft course</text>
    <path class="ln" d="M230 1128 H296" marker-end="url(#a)"/>
    <path class="ln" d="M450 1128 H496" marker-end="url(#a)"/>
    <text x="800" y="1132" class="sm" text-anchor="middle">deterministic &#183; no model tokens</text>
  </g>

  <rect class="panel" x="20" y="1192" width="980" height="94" rx="4"/>
  <text x="34" y="1211" class="lbl">INJECTED SERVICES (ExecutorDeps)</text>
  <g text-anchor="middle">
    <rect class="b" x="34" y="1222" width="146" height="48" rx="2"/><text x="107" y="1245">RunArtifacts</text><text x="107" y="1260" class="sm">curriculum/runs</text>
    <rect class="b" x="192" y="1222" width="146" height="48" rx="2"/><text x="265" y="1245">Capability registry</text><text x="265" y="1260" class="sm">gap diff</text>
    <rect class="b" x="350" y="1222" width="146" height="48" rx="2"/><text x="423" y="1245">LessonProver</text><text x="423" y="1260" class="sm">local/docker</text>
    <rect class="b" x="508" y="1222" width="146" height="48" rx="2"/><text x="581" y="1245">LessonSimulator</text><text x="581" y="1260" class="sm">sim-test</text>
    <rect class="b" x="666" y="1222" width="146" height="48" rx="2"/><text x="739" y="1245">Capability outbox</text><text x="739" y="1260" class="sm">commission gaps</text>
    <rect class="b" x="824" y="1222" width="162" height="48" rx="2"/><text x="905" y="1242">Provider seam</text><text x="905" y="1260" class="sm">Mock | Live &#183; Anthropic/OpenAI</text>
  </g>
  <text x="510" y="1302" text-anchor="middle" class="sm">every agent box calls a model through the provider seam (RoleInvoker)</text>

  <rect class="panel" x="20" y="1314" width="980" height="80" rx="4"/>
  <text x="34" y="1333" class="lbl">PERSISTENCE &#8212; DISK AUTHORITATIVE</text>
  <g text-anchor="middle">
    <rect class="b" x="34" y="1344" width="238" height="40" rx="2"/><text x="153" y="1369">DiskMirroredCourseRunStore</text>
    <rect class="b" x="288" y="1344" width="176" height="40" rx="2"/><text x="376" y="1369">SQLite index</text>
    <rect class="b" x="480" y="1344" width="176" height="40" rx="2"/><text x="568" y="1369">run.json mirror</text>
    <rect class="b" x="672" y="1344" width="220" height="40" rx="2"/><text x="782" y="1369">recoverFromDisk (boot)</text>
  </g>
</svg>
