  <text x="34" y="1274" class="sm">the first point a real learner EXPERIENCE exists &#8212; requires the materialized, playable lab</text>
  <rect class="gate" x="800" y="1242" width="186" height="26" rx="3"/><text x="893" y="1259" text-anchor="middle" class="ttl">G5 &#183; Publish</text>
