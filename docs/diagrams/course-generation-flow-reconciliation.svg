    <path class="ln" d="M406 1128 H442" marker-end="url(#a)"/>
    <path class="ln" d="M596 1128 H632" marker-end="url(#a)"/>
    <text x="510" y="1184" class="sm">deterministic &#183; no model tokens &#183; per-lesson ledger &#8212; rebuilding one lesson leaves the rest standing</text>
